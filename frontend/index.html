<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DaniMarvis Store — Panel de Gestión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner"></div>
    <p class="loading-text">Iniciando panel de gestión...</p>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="app-shell hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <a href="#/dashboard" class="sidebar-logo">
          <span class="logo-icon">
            <svg width="32" height="36" viewBox="0 0 38 42" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13 10 C13 5.5 16 3 19 3 C22 3 25 5.5 25 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
              <rect x="4" y="10" width="30" height="28" rx="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
              <text x="8" y="30" font-family="Georgia,serif" font-size="16" font-weight="600" fill="currentColor">D</text>
              <text x="18" y="30" font-family="Georgia,serif" font-size="16" font-weight="600" fill="#c9847a">M</text>
              <path d="M27.5 21 C27.5 20.2 26.8 19.5 26 19.5 C25.5 19.5 25.1 19.75 24.85 20.1 C24.6 19.75 24.2 19.5 23.7 19.5 C22.9 19.5 22.2 20.2 22.2 21 C22.2 22.4 24.85 24 24.85 24 C24.85 24 27.5 22.4 27.5 21Z" fill="#c9847a"/>
            </svg>
          </span>
          <span class="logo-text">DANI <span class="logo-marvis">MARVIS</span></span>
        </a>
        <span class="sidebar-badge">Panel</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#/dashboard" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="#/products" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span class="sidebar-link-label">Productos</span>
          <span class="sidebar-count" data-count="products">—</span>
        </a>
        <a href="#/providers" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="sidebar-link-label">Proveedores</span>
          <span class="sidebar-count" data-count="providers">—</span>
        </a>
        <a href="#/sales" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span class="sidebar-link-label">Ventas</span>
          <span class="sidebar-count" data-count="sales">—</span>
        </a>
        <a href="#/publications" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Publicaciones
        </a>
        <a href="#/catalog-images" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          Catálogo público
        </a>
        <a href="#/settings" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Configuración
        </a>
        <a href="#/backup" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Respaldos
        </a>
        <div class="sidebar-divider"></div>
        <a href="#/exports" class="sidebar-link" data-route>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Exportaciones
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebar-user"></div>
        <button id="logout-btn" class="sidebar-logout" title="Cerrar sesión">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Salir
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-area">
      <header class="topbar">
        <button id="sidebar-toggle" class="topbar-menu-btn" aria-label="Menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-title">
          <span id="page-title">Dashboard</span>
        </div>
        <div class="topbar-actions">
          <a href="https://dyaunleeambar.github.io/DaniMarvis-Store/public-catalog/" target="_blank" class="btn btn--sm btn--ghost" title="Ver tienda">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            Tienda
          </a>
        </div>
      </header>

      <main id="app-main" class="app-main"></main>
    </div>
  </div>

  <!-- LOGIN CONTAINER (outside app-shell) -->
  <div id="login-container"></div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

  <!-- MODAL CONTAINER -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
    <div id="modal-confirm" class="modal-confirm hidden">
      <div id="modal-confirm-box" class="modal-content"></div>
    </div>
  </div>

  <script src="js/lib/jspdf.umd.min.js"></script>
  <script src="js/lib/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="js/core/app.js"></script>
</body>
</html>
